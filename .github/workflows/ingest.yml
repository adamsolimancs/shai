name: Ingestion Cron

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Check ingest window
        id: schedule
        run: |
          hour=$(TZ="America/New_York" date +%H)
          minute=$(TZ="America/New_York" date +%M)
          if [ "$hour" -ge 15 ] && [ "$hour" -le 23 ]; then
            echo "run_worker=true" >> "$GITHUB_OUTPUT"
          elif [ "$minute" -eq 00 ] && [ $((10#$hour % 3)) -eq 0 ]; then
            echo "run_worker=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_worker=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        if: steps.schedule.outputs.run_worker == 'true'
      - uses: actions/setup-node@v6
        if: steps.schedule.outputs.run_worker == 'true'
        with:
          node-version: 24
      - name: Install worker deps
        if: steps.schedule.outputs.run_worker == 'true'
        run: npm ci --prefix workers
      - name: Run worker
        if: steps.schedule.outputs.run_worker == 'true'
        env:
          WORKER_MODE: cron
          CRON_MIN_INTERVAL_MS: 60000
          CRON_WINDOW_START_HOUR: 15
          CRON_WINDOW_END_HOUR: 0
          CRON_IN_WINDOW_MIN_INTERVAL_MS: 900000
          CRON_IN_WINDOW_MAX_INTERVAL_MS: 1800000
          CRON_OFF_WINDOW_INTERVAL_MS: 10800000
          CRON_LIVE_BOXSCORE_LOOKBACK_DAYS: 2
          CRON_LIVE_BOXSCORE_INTERVAL_MS: 900000
          CRON_OFF_WINDOW_LIVE_BOXSCORE_INTERVAL_MS: 10800000
          CRON_LIVE_GAMES_LOOKBACK_DAYS: 3
          CRON_LIVE_GAMES_INTERVAL_MS: 900000
          CRON_OFF_WINDOW_LIVE_GAMES_INTERVAL_MS: 10800000
          CRON_MAINTENANCE_MIN_REMAINING_MS: 600000
          CRON_MAX_RUNS_PER_DAY: 0
          CRON_MAX_RUNTIME_MS: 3600000
          HISTORIC_SEASONS_BACK: 2
          PLAYERS_HISTORIC_MODE: once
          PLAYERS_HISTORIC_SEASONS_BACK: 2
          API_MIN_INTERVAL_MS: 1500
          BACKEND_API_BASE_URL: ${{ secrets.BACKEND_API_BASE_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SCHEMA: public
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          CACHE_KEY_PREFIX: nba:serve
          NBA_TIME_ZONE: America/New_York
        run: node workers/worker-live.js
