mode: game
data:
  input_path: ml/data/processed/game_logs.parquet
  synthetic_output_path: ml/data/processed/game_logs_synth.parquet
  timestamp_column: game_date
  target_column: rating
  id_columns:
    - player_id
    - game_id
features:
  per36_base_stats:
    - pts
    - ast
    - reb
    - stl
    - blk
    - tov
    - plus_minus
  retain_raw_stats:
    - ts_pct
    - usg_pct
    - pace
  categorical:
    - position
    - home_away
    - wl
  minimum_minutes: 8.0
target:
  type: heuristic
  label_column: rating
  scale_min: 0
  scale_max: 100
  weights:
    pts_per36: 0.4
    ast_per36: 0.25
    reb_per36: 0.15
    stl_per36: 0.07
    blk_per36: 0.05
    tov_per36: -0.05
    plus_minus_per36: 0.2
    ts_pct: 0.2
training:
  test_size: 0.2
  random_state: 13
  model_type: elasticnet
  model_params:
    alpha: 0.3
    l1_ratio: 0.25
output:
  dir: models/player_ratings/game
  tag: dev

